server {
  listen 8080;
  listen [::]:8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  location ~* \.(?:css|js|mjs|json|woff2?|ttf|otf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
